name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build and deploy to gh-pages"
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0 # Required so Docusaurus can read git history for "last updated" timestamps

      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Restore the content-hash cache so unchanged chunks don't re-embed.
      # Keyed by chunker + script source so bumping CHUNKER_VERSION invalidates.
      - name: Restore RAG embed cache
        uses: actions/cache@v4
        with:
          path: .rag-cache.json
          key: rag-cache-v1-${{ hashFiles('scripts/build-rag.mjs') }}-${{ github.sha }}
          restore-keys: |
            rag-cache-v1-${{ hashFiles('scripts/build-rag.mjs') }}-
            rag-cache-v1-

      - name: Build
        env:
          AI_CHAT_WEBHOOK_URL: ${{ secrets.AI_CHAT_WEBHOOK_URL }}
          TEMPLATE_IMPORT_PROXY_URL: ${{ secrets.TEMPLATE_IMPORT_PROXY_URL }}
          UNSUBSCRIBE_PHONES_WEBHOOK_URL: ${{ secrets.UNSUBSCRIBE_PHONES_WEBHOOK_URL }}
          GISCUS_REPO: ${{ secrets.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ secrets.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ secrets.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ secrets.GISCUS_CATEGORY_ID }}
          GISCUS_LANG: ${{ secrets.GISCUS_LANG }}
          # Build-time RAG sync (prebuild → scripts/build-rag.mjs).
          # Skipped cleanly if required vars are unset. Needs SUPABASE_URL +
          # SUPABASE_SECRET_KEY, plus either OPENAI_API_KEY or
          # EMBED_WEBHOOK_URL + EMBED_WEBHOOK_SECRET.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        #   EMBED_WEBHOOK_URL: ${{ secrets.EMBED_WEBHOOK_URL }}
        #   EMBED_WEBHOOK_SECRET: ${{ secrets.EMBED_WEBHOOK_SECRET }}
        run: npm run build

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          enable_jekyll: false # Critical for Docusaurus: prevents Jekyll
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
