name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build and deploy to gh-pages"
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0 # Required so Docusaurus can read git history for "last updated" timestamps

      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          FEEDBACK_WEBHOOK_URL: ${{ secrets.FEEDBACK_WEBHOOK_URL }}
        run: npm run build

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          enable_jekyll: false # Critical for Docusaurus: prevents Jekyll
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
